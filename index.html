<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium Email Signature</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            background: #eef2f6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signature-container {
            background: #ffffff;
            padding: 45px 55px;
            border-radius: 20px;
            box-shadow: 
                0 20px 40px -10px rgba(0,0,0,0.08), 
                0 1px 3px rgba(0,0,0,0.03);
            border: 1px solid rgba(229, 231, 235, 0.5);
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .signature {
            color: #1f2937;
            width: 740px;
        }

        .greeting {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .flip-container {
            perspective: 1000px;
            width: 140px;
            height: 140px;
        }

        .flipper {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            animation: flip-auto 5s infinite;
        }

        @keyframes flip-auto {
            0%, 40% { transform: rotateY(0deg); }
            50%, 90% { transform: rotateY(180deg); }
            100% { transform: rotateY(0deg); }
        }

        .front, .back {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            border-radius: 50%;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.15);
        }

        .front {
            z-index: 2;
            transform: rotateY(0deg);
            border: 4px solid #ffffff;
            overflow: hidden;
            background: #f3f4f6;
        }

        .front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center; 
        }

        .back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 4px solid #3b82f6;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #93c5fd;
            padding: 15px;
            line-height: 1.5;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .back span {
            color: #ffffff;
            font-weight: 800;
        }

        .name {
            font-size: 32px;
            font-weight: 800;
            color: #111827;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }

        .role {
            font-size: 17px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #2563eb; /* Entire sentence blue */
            letter-spacing: 0.2px;
        }
        
        .tagline {
            font-size: 14.5px;
            color: #6b7280;
            margin: 0 0 16px 0;
            line-height: 1.5;
            font-style: italic;
        }

        /* Modern Social Icons - Clean & Bug-free */
        .socials {
            display: flex;
            gap: 12px;
        }
        
        .social-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px; 
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            background: #f3f4f6;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #e5e7eb;
        }
        
        .social-icon:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .social-icon img {
            width: 18px;
            height: 18px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        
        .social-icon:hover img {
            opacity: 1; /* Highlights the icon subtly without breaking colors */
        }

        hr.divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, #e5e7eb 0%, rgba(243, 244, 246, 0.1) 100%);
            margin: 30px 0;
        }

        .contact-table {
            width: 100%;
            font-size: 14.5px;
            color: #4b5563;
            line-height: 2.2;
        }
        
        .contact-table td {
            white-space: nowrap; 
            padding-right: 20px;
        }

        .contact-label {
            font-weight: 700;
            color: #111827;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.8px;
            display: inline-block;
            width: 95px;
            opacity: 0.7;
        }

        .contact-table a {
            color: #4b5563;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .contact-table a:hover {
            color: #2563eb;
            transform: translateX(2px);
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="signature-container">
        <div class="signature">
            <div class="greeting">Kind regards,</div>

            <table cellpadding="0" cellspacing="0" style="width: 100%;">
                <tr>
                    <td style="width: 170px; vertical-align: middle;">
                        <div class="flip-container">
                            <div class="flipper">
                                <div class="front">
                                    <img src="https://raw.githubusercontent.com/Potluri-Naga-Venkata-Sai/Portfolio-assets/main/Profile.jpeg" alt="Profile">
                                </div>
                                <div class="back">
                                    <div>Think simple.<br><span>Work smarter.</span></div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td style="vertical-align: middle; padding-left: 20px;">
                        <h1 class="name">Naga Venkata Sai Potluri</h1>
                        <p class="role">AI/ML & Robotics Engineer</p>
                        
                        <p class="tagline">Building intelligent software that solves real-world problems.</p>

                        <div class="socials">
                            <a href="https://github.com/Potluri-Naga-Venkata-Sai" class="social-icon" target="_blank">
                                <img src="assets/github.svg" alt="GitHub">
                            </a>
                            <a href="https://x.com/Pnvs0954" class="social-icon" target="_blank">
                                <img src="assets/x.svg" alt="X">
                            </a>
                            <a href="https://www.linkedin.com/in/naga-venkata-sai-potluri/" class="social-icon" target="_blank">
                                <img src="assets/linkedin.svg" alt="LinkedIn">
                            </a>
                            <a href="https://nagavenkatasai.me/" class="social-icon" target="_blank">
                                <img src="assets/globe.svg" alt="Website">
                            </a>
                        </div>
                    </td>
                </tr>
            </table>

            <hr class="divider">

            <table class="contact-table" cellpadding="0" cellspacing="0">
                <tr>
                    <td style="width: 40%;">
                        <span class="contact-label">Phone</span>
                        <a href="tel:+916302543156">+91 6302543156</a>
                    </td>
                    <td style="width: 60%;">
                        <span class="contact-label">Email</span>
                        <a href="mailto:nagavenkatasaipotluri@gmail.com">nagavenkatasaipotluri@gmail.com</a>
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="contact-label">Education</span>
                        B-Tech CSE (AI & ML)
                    </td>
                    <td>
                        <span class="contact-label">Website</span>
                        <a href="https://nagavenkatasai.me/" target="_blank">www.nagavenkatasai.me</a>
                    </td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
